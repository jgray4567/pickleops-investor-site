<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PickleOps — Private Access</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/jpeg" href="assets/pickleops-logo.jpg" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    body{display:grid;place-items:center;min-height:100vh}
    .gate{max-width:460px;width:92%;background:#fff;border:1px solid #d9d6cb;border-top:4px solid #0b5f3c;border-radius:10px;padding:22px}
    .gate img{width:150px;display:block;margin:0 auto 12px;border-radius:8px}
    .gate h1{font:700 28px Georgia,serif;color:#08472d;text-align:center;margin:0 0 8px}
    .gate p{color:#5a5a5a;text-align:center;margin:0 0 16px}
    .gate input{width:100%;padding:11px 12px;border:1px solid #ccc;border-radius:6px;font-size:15px}
    .row{display:flex;gap:10px;margin-top:10px}
    .row button{flex:1;padding:10px 12px;border:0;border-radius:6px;font-weight:700;cursor:pointer}
    .primary{background:#4b2e83;color:#fff}
    .ghost{background:#f1f1f1}
    .err{color:#b42318;font-size:13px;margin-top:10px;min-height:18px}
  </style>
</head>
<body>
  <main class="gate">
    <img src="assets/pickleops-logo.jpg" alt="PickleOps" />
    <h1>Private Access</h1>
    <p>Enter access code to continue.</p>
    <input id="code" type="password" placeholder="Access code" autocomplete="off" />
    <div class="row">
      <button class="primary" id="enterBtn">Enter</button>
      <button class="ghost" id="hintBtn" type="button">Request Access</button>
    </div>
    <div class="err" id="msg"></div>
  </main>
  <script src="assets/gateway.js"></script>
</body>
</html>
